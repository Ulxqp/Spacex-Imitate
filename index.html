<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaceX | Navigation Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">SPACEX</div>
        <ul class="nav-links">
            <li><a href="#falcon9">FALCON 9</a></li>
            <li><a href="#dragon">DRAGON</a></li>
            <li><a href="#starship">STARSHIP</a></li>
            <li><a href="#human-spaceflight">HUMAN SPACEFLIGHT</a></li>
        </ul>
    </nav>

    <section class="hero-section" id="falcon9">
        <div class="content">
            <h3>REUSABLE ROCKET</h3>
            <h1>FALCON 9</h1>
            <button class="btn-outline">LEARN MORE</button>
        </div>
    </section>

    <section class="hero-section" id="dragon">
        <div class="content">
            <h3>ORBITAL SPACECRAFT</h3>
            <h1>DRAGON</h1>
            <button class="btn-outline">VIEW UPDATES</button>
        </div>
    </section>

    <section class="hero-section" id="starship">
        <div class="content">
            <h3>MARS MISSION</h3>
            <h1>STARSHIP</h1>
            <button class="btn-outline">FLIGHT TEST</button>
        </div>
    </section>

    <section class="hero-section" id="human-spaceflight">
        <div class="content">
            <h3>BEYOND EARTH</h3>
            <h1>HUMAN SPACEFLIGHT</h1>
            <button class="btn-outline">BOOK A TRIP</button>
        </div>
    </section>

</body>
</html>
